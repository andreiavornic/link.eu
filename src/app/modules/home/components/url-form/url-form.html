
      <mat-card appearance="outlined" class="card-group">
        <form [formGroup]="form" (ngSubmit)="onSubmit()" class="p-4 p-lg-5">
          <mat-form-field appearance="outline" class="d-block">
            <mat-label>Url</mat-label>
            <input type="url" matInput formControlName="url"
                   placeholder="Paste your long URL here...">
            @if (form.controls.url.touched && form.controls.url.errors) {
              <mat-error>
                @if (form.controls.url.errors['required']) {
                  URL is required
                } @else if (form.controls.url.errors['invalidUrl']) {
                  Please enter a valid URL
                }
              </mat-error>
            }
          </mat-form-field>
          <div class="d-flex justify-content-center">
            <button
              class="btn-submit"
              type="submit"
              matButton="filled"
              [disabled]="form.invalid || facade.isLoading()"
            >
              @if (facade.isLoading()) {
                <div class="d-flex align-items-center gap-2">
                  <div class="spinner-border spinner-border-sm" role="status">
                    <span class="visually-hidden">Loading...</span>
                  </div>
                  Shortening...
                </div>

              } @else {
                Shorten URL
              }
            </button>
          </div>
        </form>
      </mat-card>
