<div class="card-group justify-content-end p-4">
  <div class="table-container">
    <table mat-table [dataSource]="dataSource">
      <ng-container matColumnDef="originalUrl">
        <th mat-header-cell *matHeaderCellDef> Original Url</th>
        <td mat-cell *matCellDef="let element">
        <span class="fs-6  text-light-emphasis">
         {{ element.originalUrl }}
        </span>
        </td>
      </ng-container>
      <ng-container matColumnDef="shortUrl">
        <th mat-header-cell *matHeaderCellDef> Short Url</th>
        <td mat-cell *matCellDef="let element">
          <a [href]="element.shortUrl" target="_blank" class="fs-6 link-opacity-100">{{ element.shortUrl }}</a>
          <button class="copy-icon-btn" (click)="copy(element.shortUrl)" title="Copy">
            📋
          </button>
        </td>
      </ng-container>
      <ng-container matColumnDef="createdAt">
        <th mat-header-cell *matHeaderCellDef> Created</th>
        <td mat-cell *matCellDef="let element">
        <span class="text-body-tertiary">
        {{ element.createdAt | date : "MMM dd, yyyy" }}
          </span>
        </td>
      </ng-container>
      <ng-container matColumnDef="action">
        <th mat-header-cell *matHeaderCellDef> Symbol</th>
        <td mat-cell *matCellDef="let element">
          <a [routerLink]="['/my-links', element.id]" matButton>
            View Analytics →
          </a>
        </td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
  </div>

  <mat-paginator [pageSizeOptions]="[5, 10, 20]"
                 showFirstLastButtons
                 aria-label="Select page of periodic elements">
  </mat-paginator>
</div>
